name: "Tenter"
description: "Pre-publish artifact integrity scanner. Catches source maps, debug artifacts, secrets, and sensitive files before they ship."
author: "goweft"

branding:
  icon: "shield"
  color: "blue"

inputs:
  target:
    description: "Path to scan (directory, tarball, or wheel)"
    required: false
    default: "."
  format:
    description: "Output format: human, json, or sarif"
    required: false
    default: "sarif"
  fail-on:
    description: "Minimum severity to fail: critical, high, medium, low, info"
    required: false
    default: "high"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Run scan
      id: scan
      shell: bash
      run: |
        set +e
        PYTHONPATH="${{ github.action_path }}/src" python -m tenter scan "${{ inputs.target }}" \
          --format "${{ inputs.format }}" \
          --fail-on "${{ inputs.fail-on }}" \
          > tenter-results.${{ inputs.format == 'sarif' && 'sarif' || 'txt' }}
        echo "exit_code=$?" >> $GITHUB_OUTPUT

    - name: Upload SARIF
      if: inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: tenter-results.sarif
      continue-on-error: true

    - name: Check result
      shell: bash
      run: exit ${{ steps.scan.outputs.exit_code }}
